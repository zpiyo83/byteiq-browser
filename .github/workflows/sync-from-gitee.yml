name: Sync from Gitee
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'  # 每2小时检查一次

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add Gitee remote
        run: |
          git remote add gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USERNAME }}/${{ secrets.GITEE_REPO }}.git || git remote set-url gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USERNAME }}/${{ secrets.GITEE_REPO }}.git

      - name: Fetch from Gitee
        run: git fetch gitee

      - name: Check if Gitee has new commits
        id: check
        run: |
          GITEE_LATEST=$(git rev-parse gitee/main)
          GITHUB_LATEST=$(git rev-parse HEAD)
          if [ "$GITEE_LATEST" != "$GITHUB_LATEST" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "gitee_commit=$GITEE_LATEST" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync from Gitee
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git push github $(git rev-parse gitee/main):main --force
          echo "Synced from Gitee commit: ${{ steps.check.outputs.gitee_commit }}"
